<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Random Image · API Ninjas Hub</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;700&display=swap" rel="stylesheet"/>
<style>
  *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
  body { min-height:100vh; background:#040d0e; color:#ccf2f4; font-family:'Outfit',sans-serif; background-image:radial-gradient(ellipse at 50% 30%,rgba(0,212,170,0.07) 0%,transparent 60%); overflow-x:hidden; }
  .back { position:fixed; top:14px; left:14px; z-index:100; text-decoration:none; color:#00d4aa; font-size:0.78rem; letter-spacing:0.1em; text-transform:uppercase; background:rgba(4,13,14,0.85); padding:7px 14px; border-radius:100px; border:1px solid rgba(0,212,170,0.25); backdrop-filter:blur(8px); }
  header { text-align:center; padding:72px 16px 36px; }

  h1 { font-size:clamp(2.2rem,9vw,5.5rem); font-weight:700; line-height:1.1; }
h1 .txt { background:linear-gradient(135deg,#00d4aa,#06b6d4); -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text; }

  .subtitle { margin-top:8px; color:rgba(204,242,244,0.38); font-size:clamp(0.65rem,2.5vw,0.82rem); letter-spacing:0.15em; text-transform:uppercase; }

  .container { max-width:780px; margin:0 auto; padding:0 16px 80px; }
  .img-frame { position:relative; border-radius:18px; overflow:hidden; border:1px solid rgba(0,212,170,0.15); min-height:260px; background:rgba(0,212,170,0.04); display:flex; align-items:center; justify-content:center; margin-bottom:18px; }
  .img-frame img { width:100%; height:auto; display:block; animation:fadeIn 0.5s ease; }
  @keyframes fadeIn { from{opacity:0;transform:scale(0.98)} to{opacity:1;transform:scale(1)} }
  .img-overlay { position:absolute; inset:0; display:flex; align-items:center; justify-content:center; background:rgba(4,13,14,0.58); opacity:0; transition:opacity 0.28s; }
  .img-frame:hover .img-overlay { opacity:1; }
  .overlay-btn { padding:10px 22px; background:rgba(0,212,170,0.2); border:1px solid #00d4aa; border-radius:100px; color:#00d4aa; font-family:'Outfit',sans-serif; font-size:0.88rem; cursor:pointer; transition:background 0.2s; }
  .overlay-btn:hover { background:rgba(0,212,170,0.35); }
  .placeholder { text-align:center; color:rgba(0,212,170,0.2); padding:40px 16px; }
  .placeholder-icon { font-size:3.5rem; display:block; margin-bottom:10px; }
  .placeholder-text { font-size:0.82rem; letter-spacing:0.1em; }

  .controls { display:flex; gap:12px; justify-content:center; flex-wrap:wrap; }
  .btn-main { padding:12px 34px; background:linear-gradient(135deg,#00d4aa,#06b6d4); border:none; border-radius:100px; color:#040d0e; font-family:'Outfit',sans-serif; font-size:0.92rem; font-weight:700; cursor:pointer; transition:transform 0.2s,box-shadow 0.2s; }
  .btn-main:hover { transform:scale(1.04); box-shadow:0 8px 28px rgba(0,212,170,0.28); }
  .btn-main:active { transform:scale(0.97); }
  .btn-dl { padding:12px 26px; background:transparent; border:1px solid rgba(0,212,170,0.3); border-radius:100px; color:#00d4aa; font-family:'Outfit',sans-serif; font-size:0.92rem; cursor:pointer; transition:all 0.2s; display:none; }
  .btn-dl:hover { background:rgba(0,212,170,0.1); }

  .loading { text-align:center; color:rgba(0,212,170,0.45); padding:60px 16px; }
  .spinner { display:inline-block; width:34px; height:34px; border:2px solid rgba(0,212,170,0.1); border-top-color:#00d4aa; border-radius:50%; animation:spin 0.8s linear infinite; }
  @keyframes spin { to{transform:rotate(360deg)} }
  .error { text-align:center; color:#ef4444; font-size:0.88rem; }
</style>
</head>
<body>
<a href="../index.html" class="back">← Hub</a>
<header>
  <h1>🖼️ Random Image</h1>
  <p class="subtitle">Discover a surprising image</p>
</header>
<div class="container">
  <div class="img-frame" id="img-frame">
    <div class="placeholder"><span class="placeholder-icon">🖼️</span><p class="placeholder-text">Press the button to discover</p></div>
  </div>
  <div class="controls">
    <button class="btn-main" onclick="load()">✨ New image</button>
    <button class="btn-dl" id="dl-btn" onclick="download()">⬇ Download</button>
  </div>
</div>
<script src="../js/config.js"></script>
<script>
  const API = CONFIG.API_URL; 
  let src = null;
  async function load() {
    const f=document.getElementById('img-frame');
    f.innerHTML='<div class="loading"><div class="spinner"></div></div>';
    try {
      const r=await fetch(`${API}/api/randomimage`);
      const d=await r.json();
      src=`data:image/jpeg;base64,${d.image}`;
      f.innerHTML=`<img src="${src}" alt="Random image"/><div class="img-overlay"><button class="overlay-btn" onclick="download()">⬇ Download</button></div>`;
      document.getElementById('dl-btn').style.display='block';
    } catch { f.innerHTML='<p class="error">Error connecting to backend.</p>'; }
  }
  function download(){if(!src)return;const a=document.createElement('a');a.href=src;a.download=`img-${Date.now()}.jpg`;a.click();}
</script>
</body>
</html>
