<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Facts · API Ninjas Hub</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,400&family=DM+Sans:wght@300;400&display=swap" rel="stylesheet"/>
<style>
  *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
  html { font-size:16px; }
  body { min-height:100vh; background:#0d0a05; color:#f0ead6; font-family:'DM Sans',sans-serif; background-image:radial-gradient(ellipse at 20% 50%,rgba(255,107,53,0.08) 0%,transparent 60%); overflow-x:hidden; }

  .back { position:fixed; top:14px; left:14px; z-index:100; text-decoration:none; color:#ff6b35; font-size:0.78rem; letter-spacing:0.1em; text-transform:uppercase; background:rgba(13,10,5,0.85); padding:7px 14px; border-radius:100px; border:1px solid rgba(255,107,53,0.25); backdrop-filter:blur(8px); transition:opacity 0.2s; }
  .back:hover { opacity:0.8; }

  header { text-align:center; padding:72px 16px 0; border-bottom:1px solid rgba(255,107,53,0.12); }
h1 { font-family:'Playfair Display',serif; font-size:clamp(2.2rem,9vw,5.5rem); font-weight:700; line-height:1.1; }
h1 .txt { background:linear-gradient(135deg,#ff6b35,#ffd166); -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text; }
  .subtitle { margin-top:8px; color:rgba(240,234,214,0.4); font-size:clamp(0.65rem,2.5vw,0.85rem); letter-spacing:0.12em; text-transform:uppercase; padding:0 8px; }
  #translate-bar-container { padding:12px 0 16px; }

  .container { max-width:720px; margin:0 auto; padding:24px 16px 80px; }

  .fact-card { position:relative; background:rgba(255,255,255,0.03); border:1px solid rgba(255,107,53,0.12); border-left:3px solid #ff6b35; border-radius:4px 12px 12px 4px; padding:22px 20px 22px 36px; margin-bottom:14px; opacity:0; animation:slideIn 0.45s ease forwards; }
  @keyframes slideIn { to{opacity:1;transform:translateX(0)} from{opacity:0;transform:translateX(-16px)} }
  .fact-card:nth-child(1){animation-delay:0s} .fact-card:nth-child(2){animation-delay:.08s} .fact-card:nth-child(3){animation-delay:.16s} .fact-card:nth-child(4){animation-delay:.24s} .fact-card:nth-child(5){animation-delay:.32s}
  .fact-icon { position:absolute; left:-15px; top:50%; transform:translateY(-50%); width:28px; height:28px; background:#ff6b35; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:0.8rem; flex-shrink:0; }
  .fact-text { font-family:'Playfair Display',serif; font-style:italic; font-size:clamp(0.95rem,2.5vw,1.1rem); line-height:1.75; }

  .btn { display:block; margin:20px auto 0; padding:11px 36px; background:transparent; border:1px solid #ff6b35; color:#ff6b35; font-family:'DM Sans',sans-serif; font-size:0.85rem; letter-spacing:0.1em; text-transform:uppercase; cursor:pointer; border-radius:100px; transition:all 0.25s; width:fit-content; }
  .btn:hover { background:#ff6b35; color:#0d0a05; }
  .btn:active { transform:scale(0.97); }

  .loading { text-align:center; padding:60px 16px; color:rgba(255,107,53,0.45); font-size:0.88rem; letter-spacing:0.08em; }
  .error { text-align:center; padding:40px 16px; color:#ef4444; font-size:0.88rem; }
</style>
</head>
<body>
<a href="../index.html" class="back">← Hub</a>
<header>
  <h1>🧠 <span class="txt">Facts</span></h1>
  <p class="subtitle">Surprising data about the world</p>
  <div id="translate-bar-container"></div>
</header>
<div class="container">
  <div id="content"><div class="loading">Loading facts...</div></div>
  <button class="btn" onclick="load()">Load more</button>
</div>
<script src="../js/config.js"></script>
<script src="../js/translate.js"></script>
<script>
  let rawData = [], currentLang = 'en';
  renderTranslateBar('translate-bar-container', async (lang) => { currentLang = lang; if (rawData.length) render(rawData, lang); });
  async function render(data, lang) {
    const texts = data.map(f => f.fact);
    const t = lang !== 'en' ? await translateTexts(texts, lang) : texts;
    document.getElementById('content').innerHTML = t.map(s => `<div class="fact-card"><div class="fact-icon">💡</div><p class="fact-text">${s}</p></div>`).join('');
  }
  async function load() {
    document.getElementById('content').innerHTML = '<div class="loading">Loading facts...</div>';
    try { const r = await fetch(`${API}/api/facts`); rawData = await r.json(); render(rawData, currentLang); }
    catch { document.getElementById('content').innerHTML = '<div class="error">Error connecting to backend.</div>'; }
  }
  load();
</script>
</body>
</html>
