<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Passwords · API Hub</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=DM+Sans:wght@300;400;600&display=swap" rel="stylesheet"/>
<style>
  *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
  body { min-height:100vh; background:#0c0608; color:#ffd0d8; font-family:'DM Sans',sans-serif; background-image:radial-gradient(ellipse at 50% 40%,rgba(239,68,68,0.08) 0%,transparent 60%); overflow-x:hidden; }
  .back { position:fixed; top:14px; left:14px; z-index:100; text-decoration:none; color:#ef4444; font-size:0.78rem; letter-spacing:0.1em; text-transform:uppercase; background:rgba(12,6,8,0.85); padding:7px 14px; border-radius:100px; border:1px solid rgba(239,68,68,0.25); backdrop-filter:blur(8px); }
  header { text-align:center; padding:72px 16px 36px; }
  h1 { font-size:clamp(2.2rem,9vw,5.5rem); font-weight:600; line-height:1.1; }
h1 .txt { background:linear-gradient(135deg,#ef4444,#f97316); -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text; }
  .subtitle { margin-top:8px; color:rgba(255,208,216,0.38); font-size:clamp(0.65rem,2.5vw,0.82rem); letter-spacing:0.15em; text-transform:uppercase; }

  .container { max-width:560px; margin:32px auto; padding:0 16px 80px; }
  .card { background:rgba(255,255,255,0.03); border:1px solid rgba(239,68,68,0.15); border-radius:18px; padding:28px 22px; }
  .length-section { margin-bottom:26px; }
  .length-row { display:flex; justify-content:space-between; align-items:center; margin-bottom:14px; }
  .length-row span { font-size:0.7rem; text-transform:uppercase; letter-spacing:0.15em; color:rgba(255,208,216,0.38); }
  .length-val { font-family:'JetBrains Mono',monospace; font-size:1.7rem; font-weight:700; color:#ef4444; }
  input[type=range] { width:100%; height:4px; background:rgba(239,68,68,0.2); border-radius:2px; outline:none; cursor:pointer; -webkit-appearance:none; }
  input[type=range]::-webkit-slider-thumb { -webkit-appearance:none; width:20px; height:20px; border-radius:50%; background:#ef4444; cursor:pointer; box-shadow:0 0 10px rgba(239,68,68,0.38); }
  .gen-btn { width:100%; padding:13px; background:linear-gradient(135deg,#ef4444,#f97316); border:none; border-radius:12px; color:#fff; font-family:'DM Sans',sans-serif; font-size:0.95rem; font-weight:600; cursor:pointer; transition:opacity 0.2s; margin-bottom:18px; }
  .gen-btn:hover { opacity:0.86; }
  .gen-btn:active { transform:scale(0.98); }

  .passwords { display:flex; flex-direction:column; gap:10px; }
  .pw-item { display:flex; align-items:flex-start; gap:10px; padding:13px 15px; background:rgba(239,68,68,0.05); border:1px solid rgba(239,68,68,0.12); border-radius:12px; opacity:0; animation:slideIn 0.3s ease forwards; }
  .pw-item:nth-child(2){animation-delay:.05s} .pw-item:nth-child(3){animation-delay:.1s}
  @keyframes slideIn { to{opacity:1;transform:translateX(0)} from{opacity:0;transform:translateX(-8px)} }
  .pw-info { flex:1; min-width:0; }
  .pw-text { font-family:'JetBrains Mono',monospace; font-size:clamp(0.72rem,2.5vw,0.9rem); color:#ffd0d8; word-break:break-all; line-height:1.5; }
  .strength { margin-top:7px; }
  .strength-label { font-size:0.65rem; text-transform:uppercase; letter-spacing:0.1em; color:rgba(255,208,216,0.28); margin-bottom:4px; }
  .strength-bar { height:3px; border-radius:2px; background:rgba(255,255,255,0.05); overflow:hidden; }
  .strength-fill { height:100%; border-radius:2px; transition:width 0.5s ease,background 0.5s; }
  .copy-btn { flex-shrink:0; padding:7px 13px; background:transparent; border:1px solid rgba(239,68,68,0.3); border-radius:8px; color:#ef4444; font-size:0.75rem; cursor:pointer; transition:all 0.2s; white-space:nowrap; align-self:center; }
  .copy-btn:hover { background:rgba(239,68,68,0.1); }
  .copy-btn.copied { color:#22c55e; border-color:rgba(34,197,94,0.3); }

  .loading { text-align:center; padding:40px 16px; color:rgba(239,68,68,0.4); font-size:0.88rem; }
  .error { color:#ef4444; text-align:center; padding:20px; font-size:0.85rem; }
</style>
</head>
<body>
<a href="../index.html" class="back">← Hub</a>
<header>
  <h1>🔐 Passwords</h1>
  <p class="subtitle">Generate secure passwords instantly</p>
</header>
<div class="container">
  <div class="card">
    <div class="length-section">
      <div class="length-row"><span>Length</span><div class="length-val" id="len-display">16</div></div>
      <input type="range" id="length" min="8" max="64" value="16" oninput="document.getElementById('len-display').textContent=this.value"/>
    </div>
    <button class="gen-btn" onclick="generate()">Generate passwords 🔑</button>
    <div class="passwords" id="passwords"><div class="loading">Click to generate secure passwords</div></div>
  </div>
</div>
<script src="../js/config.js"></script>
<script>
  const API = CONFIG.API_URL; 
  function score(pw){let s=0;if(pw.length>=12)s++;if(pw.length>=20)s++;if(/[A-Z]/.test(pw))s++;if(/[0-9]/.test(pw))s++;if(/[^A-Za-z0-9]/.test(pw))s++;return s;}
  function col(s){return s<=2?'#ef4444':s<=3?'#f97316':s<=4?'#fbbf24':'#22c55e';}
  function lbl(s){return s<=2?'Weak':s<=3?'Moderate':s<=4?'Strong':'Very strong';}
  async function generate() {
    const len=document.getElementById('length').value, cnt=document.getElementById('passwords');
    cnt.innerHTML='<div class="loading">Generating...</div>';
    try {
      const res=await Promise.all([1,2,3].map(()=>fetch(`${API}/api/passwordgenerator?length=${len}`).then(r=>r.json())));
      cnt.innerHTML=res.map((d,i)=>{
        const pw=d.random_password||d.password||Object.values(d)[0]||'';
        const s=score(pw), pct=(s/5)*100;
        return `<div class="pw-item"><div class="pw-info"><div class="pw-text">${pw}</div><div class="strength"><div class="strength-label">${lbl(s)}</div><div class="strength-bar"><div class="strength-fill" style="width:${pct}%;background:${col(s)}"></div></div></div></div><button class="copy-btn" id="c${i}" onclick="cp('${pw}','c${i}')">Copy</button></div>`;
      }).join('');
    } catch { cnt.innerHTML='<p class="error">Error connecting to backend.</p>'; }
  }
  async function cp(pw,id){await navigator.clipboard.writeText(pw);const b=document.getElementById(id);b.textContent='✓';b.classList.add('copied');setTimeout(()=>{b.textContent='Copy';b.classList.remove('copied');},2000);}
  generate();
</script>
</body>
</html>
