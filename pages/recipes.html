<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Recipes · API Hub</title>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,wght@0,700;1,400&family=DM+Sans:wght@300;400&display=swap" rel="stylesheet"/>
<style>
  *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
  body { min-height:100vh; background:#0f0a00; color:#f5e6c8; font-family:'DM Sans',sans-serif; background-image:radial-gradient(ellipse at 50% 0%,rgba(251,191,36,0.08) 0%,transparent 60%); overflow-x:hidden; }
  .back { position:fixed; top:14px; left:14px; z-index:100; text-decoration:none; color:#fbbf24; font-size:0.78rem; letter-spacing:0.1em; text-transform:uppercase; background:rgba(15,10,0,0.85); padding:7px 14px; border-radius:100px; border:1px solid rgba(251,191,36,0.25); backdrop-filter:blur(8px); }

  header { text-align:center; padding:72px 16px 0; }
  h1 { font-family:'Fraunces',serif; font-size:clamp(2.2rem,9vw,5.5rem); color:#fbbf24; line-height:1.1; }
  .subtitle { margin-top:8px; color:rgba(245,230,200,0.4); font-size:clamp(0.65rem,2.5vw,0.82rem); letter-spacing:0.15em; text-transform:uppercase; }

  .search-box { display:flex; gap:8px; max-width:460px; margin:18px auto 0; padding:0 4px; }
  .search-box input { flex:1; min-width:0; padding:11px 15px; background:rgba(255,255,255,0.05); border:1px solid rgba(251,191,36,0.25); border-radius:12px; color:#f5e6c8; font-family:'DM Sans',sans-serif; font-size:0.9rem; outline:none; transition:border-color 0.2s; }
  .search-box input:focus { border-color:#fbbf24; }
  .search-box input::placeholder { color:rgba(245,230,200,0.3); }
  .search-box button { padding:11px 20px; background:#fbbf24; border:none; border-radius:12px; color:#0f0a00; font-weight:600; cursor:pointer; white-space:nowrap; font-size:0.9rem; flex-shrink:0; transition:opacity 0.2s; }
  .search-box button:hover { opacity:0.85; }
  #translate-bar-container { padding:12px 0 4px; }

  /* ── CARDS GRID ── */
  .grid { display:flex; flex-wrap:wrap; gap:16px; max-width:1100px; margin:16px auto; padding:0 16px 80px; justify-content:center; }

  .recipe-card { background:rgba(255,255,255,0.03); border:1px solid rgba(251,191,36,0.1); border-radius:16px; overflow:hidden; opacity:0; animation:up 0.45s ease forwards; width:100%; max-width:420px; flex:1 1 320px; }
  .recipe-card:nth-child(1){animation-delay:0s} .recipe-card:nth-child(2){animation-delay:.08s} .recipe-card:nth-child(3){animation-delay:.16s} .recipe-card:nth-child(4){animation-delay:.24s}
  @keyframes up { to{opacity:1;transform:translateY(0)} from{opacity:0;transform:translateY(16px)} }

  /* Card header */
  .card-head { padding:20px 22px 16px; border-bottom:1px solid rgba(251,191,36,0.08); }
  .recipe-title { font-family:'Fraunces',serif; font-size:clamp(1.05rem,3vw,1.3rem); color:#fbbf24; line-height:1.3; }
  .recipe-meta { display:flex; gap:10px; margin-top:8px; flex-wrap:wrap; }
  .meta-chip { padding:3px 10px; background:rgba(251,191,36,0.08); border:1px solid rgba(251,191,36,0.15); border-radius:100px; font-size:0.68rem; color:rgba(251,191,36,0.7); }

  /* Card body */
  .card-body { padding:16px 22px 22px; }
  .section-label { font-size:0.65rem; text-transform:uppercase; letter-spacing:0.18em; color:rgba(245,230,200,0.35); margin-bottom:8px; margin-top:16px; }
  .section-label:first-child { margin-top:0; }

  /* Ingredients list */
  .ing-list { display:flex; flex-direction:column; gap:5px; }
  .ing-item { display:flex; align-items:baseline; gap:8px; font-size:clamp(0.78rem,2.5vw,0.85rem); }
  .ing-qty { color:#fbbf24; font-weight:500; min-width:52px; flex-shrink:0; font-size:0.8rem; }
  .ing-name { color:rgba(245,230,200,0.75); font-weight:300; line-height:1.4; }

  /* Instructions list */
  .step-list { display:flex; flex-direction:column; gap:8px; }
  .step-item { display:flex; gap:10px; font-size:clamp(0.78rem,2.5vw,0.85rem); line-height:1.6; }
  .step-num { color:rgba(251,191,36,0.4); font-weight:600; min-width:18px; flex-shrink:0; font-size:0.75rem; padding-top:1px; }
  .step-text { color:rgba(245,230,200,0.72); font-weight:300; }

  .loading { text-align:center; padding:60px 16px; color:rgba(251,191,36,0.4); grid-column:1/-1; font-size:0.88rem; }
  .error { text-align:center; padding:40px 16px; color:#ef4444; grid-column:1/-1; font-size:0.88rem; }
</style>
</head>
<body>
<a href="../index.html" class="back">← Hub</a>
<header>
  <h1>🍳 Recipes</h1>
  <p class="subtitle">Cook with what you have</p>
  <div class="search-box">
    <input type="text" id="q" placeholder="e.g. pasta, chicken, salad..." value=""/>
    <button onclick="load()">Search</button>
  </div>
  <div id="translate-bar-container"></div>
</header>
<div class="grid" id="content"><div class="loading">Loading recipes...</div></div>

<script src="../js/config.js"></script>
<script src="../js/translate.js"></script>

<script>
  let rawData = [], currentLang = 'en';

  renderTranslateBar('translate-bar-container', async (lang) => {
    currentLang = lang;
    if (rawData.length) render(rawData, lang);
  });

  // Format ingredient quantity nicely
  function fmtQty(ing) {
    const q = ing.quantity;
    const u = ing.unit || '';
    if (!q && !u) return '';
    if (!q) return u;
    // Convert decimal to fraction-ish display
    const n = Number(q);
    return n % 1 === 0 ? `${n} ${u}`.trim() : `${n} ${u}`.trim();
  }

  async function render(data, lang) {
    // Collect all translatable strings
    const titles     = data.map(d => d.title || '');
    const ingNames   = data.map(d => (d.ingredients || []).map(i => i.name || '').join(' | '));
    const steps      = data.map(d => (d.instructions || []).join(' | '));

    let tTitles = titles, tIngNames = ingNames, tSteps = steps;
    if (lang !== 'en') {
      [tTitles, tIngNames, tSteps] = await Promise.all([
        translateTexts(titles, lang),
        translateTexts(ingNames, lang),
        translateTexts(steps, lang),
      ]);
    }

    document.getElementById('content').innerHTML = data.map((d, i) => {
      // Re-split translated ingredient names and steps
      const ingNamesArr  = tIngNames[i].split(' | ');
      const stepsArr     = tSteps[i].split(' | ');
      const ings         = (d.ingredients || []);
      const servings     = d.servings || '';

      const ingHTML = ings.map((ing, j) => `
        <div class="ing-item">
          <span class="ing-qty">${fmtQty(ing)}</span>
          <span class="ing-name">${ingNamesArr[j] || ing.name}</span>
        </div>`).join('');

      const stepsHTML = stepsArr.map((s, j) => `
        <div class="step-item">
          <span class="step-num">${j + 1}.</span>
          <span class="step-text">${s.trim()}</span>
        </div>`).join('');

      return `
        <div class="recipe-card">
          <div class="card-head">
            <div class="recipe-title">${tTitles[i]}</div>
            <div class="recipe-meta">
              ${servings ? `<span class="meta-chip">🍽 ${servings}</span>` : ''}
              ${ings.length ? `<span class="meta-chip">🧂 ${ings.length} ingredients</span>` : ''}
              ${stepsArr.length ? `<span class="meta-chip">📋 ${stepsArr.length} steps</span>` : ''}
            </div>
          </div>
          <div class="card-body">
            <div class="section-label">Ingredients</div>
            <div class="ing-list">${ingHTML}</div>
            <div class="section-label">Instructions</div>
            <div class="step-list">${stepsHTML}</div>
          </div>
        </div>`;
    }).join('');
  }

  async function load() {
    const q = document.getElementById('q').value.trim() || '';
    document.getElementById('content').innerHTML = '<div class="loading">Loading recipes...</div>';
    try {
      const r = await fetch(`${API}/api/recipes?query=${encodeURIComponent(q)}`);
      rawData = await r.json();
      if (!rawData.length) {
        document.getElementById('content').innerHTML = '<div class="loading">No recipes found. Try another search.</div>';
        return;
      }
      render(rawData, currentLang);
    } catch {
      document.getElementById('content').innerHTML = '<div class="error">Error connecting to backend.</div>';
    }
  }

  document.getElementById('q').addEventListener('keypress', e => e.key === 'Enter' && load());
  load();
</script>
</body>
</html>
