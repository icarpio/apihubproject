<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Polls · API Ninjas Hub</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<style>
  :root {
    --bg:       #f9f7f4;
    --surface:  #ffffff;
    --border:   rgba(30,30,30,0.1);
    --ink:      #1a1a1a;
    --muted:    rgba(26,26,26,0.4);
    --accent:   #2563eb;
    --accent2:  #60a5fa;
    --green:    #16a34a;
    --red:      #dc2626;
    --card-bg:  #fefefe;
  }
  *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
  body { min-height:100vh; background:var(--bg); color:var(--ink); font-family:'DM Sans',sans-serif; overflow-x:hidden; }
  body::before { content:''; position:fixed; inset:0; background:
    radial-gradient(ellipse at 80% 10%, rgba(37,99,235,0.04) 0%, transparent 50%),
    radial-gradient(ellipse at 10% 90%, rgba(96,165,250,0.03) 0%, transparent 50%);
    pointer-events:none; z-index:0; }

  .back { position:fixed; top:14px; left:14px; z-index:100; text-decoration:none; color:var(--accent); font-size:0.72rem; letter-spacing:0.15em; text-transform:uppercase; background:rgba(249,247,244,0.92); padding:7px 14px; border-radius:100px; border:1px solid var(--border); backdrop-filter:blur(8px); font-family:'DM Sans',sans-serif; }

  /* ── HEADER ── */
  header { text-align:center; padding:clamp(52px,8vw,72px) 16px clamp(16px,3vw,24px); position:relative; z-index:1; }
  h1 { font-family:'DM Serif Display',serif; font-size:clamp(2.4rem,9vw,5.5rem); font-weight:400; line-height:1; }
  h1 em { font-style:italic; color:var(--accent); }
  .tagline { margin-top:10px; color:var(--muted); font-size:clamp(0.65rem,2vw,0.78rem); letter-spacing:0.2em; text-transform:uppercase; }

  /* ── TABS ── */
  .tabs { display:flex; justify-content:center; gap:0; margin:28px auto 0; max-width:360px; background:var(--surface); border:1px solid var(--border); border-radius:12px; padding:4px; position:relative; z-index:1; }
  .tab { flex:1; padding:9px 16px; border:none; border-radius:9px; background:transparent; font-family:'DM Sans',sans-serif; font-size:0.82rem; font-weight:500; color:var(--muted); cursor:pointer; transition:all 0.2s; }
  .tab.active { background:var(--accent); color:#fff; }

  /* ── POLLS LIST ── */
  .polls-wrap { max-width:680px; margin:32px auto; padding:0 14px clamp(40px,8vw,80px); position:relative; z-index:1; }

  .polls-empty { text-align:center; padding:60px 20px; color:var(--muted); font-family:'DM Serif Display',serif; font-style:italic; font-size:1.1rem; }
  .polls-loading { text-align:center; padding:50px; color:var(--muted); font-size:0.82rem; letter-spacing:0.1em; }

  /* Poll card */
  .poll-card { background:var(--surface); border:1px solid var(--border); border-radius:16px; padding:clamp(20px,4vw,28px); margin-bottom:16px; transition:box-shadow 0.2s; }
  .poll-card:hover { box-shadow:0 4px 24px rgba(37,99,235,0.08); }

  .poll-question { font-family:'DM Serif Display',serif; font-size:clamp(1.1rem,4vw,1.4rem); line-height:1.3; margin-bottom:20px; }
  .poll-total { font-size:0.72rem; color:var(--muted); margin-bottom:14px; letter-spacing:0.05em; }

  /* Options */
  .poll-options { display:flex; flex-direction:column; gap:10px; }
  .option-btn { width:100%; padding:0; background:none; border:none; cursor:pointer; text-align:left; }
  .option-btn:disabled { cursor:default; }
  .option-bar-wrap { position:relative; background:rgba(37,99,235,0.06); border:1px solid rgba(37,99,235,0.12); border-radius:10px; overflow:hidden; transition:all 0.2s; }
  .option-btn:not(:disabled):hover .option-bar-wrap { border-color:rgba(37,99,235,0.35); background:rgba(37,99,235,0.1); }
  .option-btn.voted .option-bar-wrap { border-color:var(--accent); }
  .option-fill { position:absolute; inset:0; background:linear-gradient(90deg, rgba(37,99,235,0.12), rgba(96,165,250,0.08)); border-radius:10px; width:0%; transition:width 0.8s cubic-bezier(0.4,0,0.2,1); }
  .option-content { position:relative; display:flex; align-items:center; justify-content:space-between; padding:11px 14px; gap:10px; }
  .option-label { font-size:clamp(0.85rem,2.5vw,0.92rem); font-weight:500; color:var(--ink); flex:1; }
  .option-btn.voted .option-label { color:var(--accent); }
  .option-stats { display:flex; gap:8px; align-items:center; flex-shrink:0; }
  .option-votes { font-size:0.72rem; color:var(--muted); }
  .option-pct { font-size:0.78rem; font-weight:600; color:var(--accent); min-width:36px; text-align:right; }
  .voted-check { font-size:0.8rem; color:var(--green); }

  .poll-footer { display:flex; align-items:center; justify-content:space-between; margin-top:16px; flex-wrap:wrap; gap:8px; }
  .poll-date { font-size:0.68rem; color:var(--muted); }
  .poll-close-btn { padding:5px 12px; background:transparent; border:1px solid rgba(220,38,38,0.2); border-radius:100px; color:rgba(220,38,38,0.6); font-size:0.68rem; cursor:pointer; transition:all 0.2s; font-family:'DM Sans',sans-serif; }
  .poll-close-btn:hover { background:rgba(220,38,38,0.06); border-color:var(--red); color:var(--red); }

  /* Vote success flash */
  .vote-msg { font-size:0.75rem; color:var(--green); margin-top:10px; display:none; }
  .vote-msg.visible { display:block; }

  /* ── ADMIN PANEL ── */
  .admin-wrap { max-width:560px; margin:32px auto; padding:0 14px clamp(40px,8vw,80px); display:none; position:relative; z-index:1; }
  .admin-wrap.visible { display:block; }

  .admin-card { background:var(--surface); border:1px solid var(--border); border-radius:16px; padding:clamp(20px,4vw,28px); }
  .admin-title { font-family:'DM Serif Display',serif; font-size:1.3rem; margin-bottom:20px; display:flex; align-items:center; gap:8px; }
  .admin-badge { font-size:0.6rem; letter-spacing:0.15em; text-transform:uppercase; background:rgba(37,99,235,0.1); color:var(--accent); padding:3px 8px; border-radius:100px; font-family:'DM Sans',sans-serif; }

  /* Token gate */
  .token-gate { margin-bottom:20px; padding:14px; background:rgba(37,99,235,0.04); border:1px solid rgba(37,99,235,0.1); border-radius:10px; }
  .token-row { display:flex; gap:8px; }
  .token-row input { flex:1; padding:9px 12px; background:rgba(255,255,255,0.8); border:1px solid var(--border); border-radius:8px; font-family:'DM Sans',sans-serif; font-size:0.85rem; outline:none; color:var(--ink); transition:border-color 0.2s; }
  .token-row input:focus { border-color:var(--accent); }
  .token-row input::placeholder { color:var(--muted); }
  .token-btn { padding:9px 16px; background:var(--accent); border:none; border-radius:8px; color:#fff; font-family:'DM Sans',sans-serif; font-size:0.82rem; font-weight:500; cursor:pointer; white-space:nowrap; }
  .token-hint { font-size:0.68rem; color:var(--muted); margin-top:6px; }
  .token-error { font-size:0.72rem; color:var(--red); margin-top:6px; display:none; }

  /* Create form */
  .create-form { display:none; }
  .create-form.visible { display:block; }
  .field { margin-bottom:14px; }
  .field label { display:block; font-size:0.65rem; letter-spacing:0.15em; text-transform:uppercase; color:var(--muted); margin-bottom:6px; }
  .field input { width:100%; padding:10px 13px; background:var(--bg); border:1px solid var(--border); border-radius:9px; font-family:'DM Sans',sans-serif; font-size:0.9rem; outline:none; color:var(--ink); transition:border-color 0.2s; }
  .field input:focus { border-color:var(--accent); }
  .field input::placeholder { color:var(--muted); }

  .options-list { display:flex; flex-direction:column; gap:7px; margin-bottom:8px; }
  .option-input-row { display:flex; gap:6px; }
  .option-input-row input { flex:1; padding:9px 12px; background:var(--bg); border:1px solid var(--border); border-radius:8px; font-family:'DM Sans',sans-serif; font-size:0.85rem; outline:none; color:var(--ink); transition:border-color 0.2s; }
  .option-input-row input:focus { border-color:var(--accent); }
  .remove-opt { width:30px; height:36px; background:transparent; border:1px solid var(--border); border-radius:8px; color:var(--muted); cursor:pointer; font-size:0.9rem; transition:all 0.2s; flex-shrink:0; }
  .remove-opt:hover { border-color:var(--red); color:var(--red); }

  .add-opt-btn { padding:7px 14px; background:transparent; border:1px dashed rgba(37,99,235,0.3); border-radius:8px; color:var(--accent); font-size:0.78rem; cursor:pointer; transition:all 0.2s; font-family:'DM Sans',sans-serif; }
  .add-opt-btn:hover { border-color:var(--accent); background:rgba(37,99,235,0.04); }
  .add-opt-btn:disabled { opacity:0.35; cursor:not-allowed; }

  .submit-btn { width:100%; padding:13px; background:var(--accent); border:none; border-radius:10px; color:#fff; font-family:'DM Sans',sans-serif; font-size:0.92rem; font-weight:600; cursor:pointer; transition:all 0.2s; margin-top:8px; }
  .submit-btn:hover { background:#1d4ed8; }
  .submit-btn:disabled { opacity:0.4; cursor:not-allowed; }
  .form-msg { font-size:0.78rem; margin-top:8px; display:none; }
  .form-msg.success { color:var(--green); display:block; }
  .form-msg.error   { color:var(--red);   display:block; }

  .error-msg { text-align:center; color:var(--red); font-size:0.85rem; padding:20px; }
</style>
</head>
<body>
<a href="../index.html" class="back">← Hub</a>

<header>
  <h1>Live <em>Polls</em></h1>
  <p class="tagline">Vote · See results in real time</p>
</header>

<div class="tabs">
  <button class="tab active" onclick="switchTab('polls')">🗳 Polls</button>
  <button class="tab" onclick="switchTab('admin')">🔐 Admin</button>
</div>

<!-- Public polls -->
<div class="polls-wrap" id="polls-view">
  <div class="polls-loading" id="polls-loading">Loading polls…</div>
  <div id="polls-list"></div>
</div>

<!-- Admin panel -->
<div class="admin-wrap" id="admin-view">
  <div class="admin-card">
    <div class="admin-title">Create Poll <span class="admin-badge">Admin</span></div>

    <!-- Token gate -->
    <div class="token-gate" id="token-gate">
      <div class="token-row">
        <input type="password" id="admin-token" placeholder="Enter admin token…"/>
        <button class="token-btn" onclick="unlockAdmin()">Unlock</button>
      </div>
      <p class="token-hint">Admin token is set via ADMIN_TOKEN env variable.</p>
      <p class="token-error" id="token-error">Invalid token.</p>
    </div>

    <!-- Create form (shown after unlock) -->
    <div class="create-form" id="create-form">
      <div class="field">
        <label>Question</label>
        <input type="text" id="poll-question" placeholder="What should we build next?"/>
      </div>
      <div class="field">
        <label>Options (2–8)</label>
        <div class="options-list" id="options-list">
          <div class="option-input-row"><input type="text" placeholder="Option 1"/><button class="remove-opt" onclick="removeOption(this)">×</button></div>
          <div class="option-input-row"><input type="text" placeholder="Option 2"/><button class="remove-opt" onclick="removeOption(this)">×</button></div>
        </div>
        <button class="add-opt-btn" id="add-opt-btn" onclick="addOption()">+ Add option</button>
      </div>
      <button class="submit-btn" onclick="createPoll()">Create Poll</button>
      <p class="form-msg" id="form-msg"></p>
    </div>
  </div>
</div>

<script src="../js/config.js"></script>
<script>
  const API = CONFIG.API_URL; 
  let adminToken   = '';
  let votedPolls   = JSON.parse(localStorage.getItem('votedPolls') || '{}'); // {pollId: optionId}
  let currentTab   = 'polls';

  // ── TABS ─────────────────────────────────────────────

  function switchTab(tab) {
    currentTab = tab;
    document.querySelectorAll('.tab').forEach((t, i) => t.classList.toggle('active', (i === 0) === (tab === 'polls')));
    document.getElementById('polls-view').style.display = tab === 'polls' ? 'block' : 'none';
    document.getElementById('admin-view').classList.toggle('visible', tab === 'admin');
  }

  // ── ADMIN UNLOCK ─────────────────────────────────────

  function unlockAdmin() {
    const token = document.getElementById('admin-token').value.trim();
    if (!token) return;
    adminToken = token;
    // Test token by creating a dry-run — just unlock UI optimistically, error shows on create
    document.getElementById('token-gate').style.display = 'none';
    document.getElementById('create-form').classList.add('visible');
  }

  // ── OPTIONS ──────────────────────────────────────────

  function addOption() {
    const list = document.getElementById('options-list');
    const count = list.children.length;
    if (count >= 8) return;
    const row = document.createElement('div');
    row.className = 'option-input-row';
    row.innerHTML = `<input type="text" placeholder="Option ${count + 1}"/><button class="remove-opt" onclick="removeOption(this)">×</button>`;
    list.appendChild(row);
    document.getElementById('add-opt-btn').disabled = list.children.length >= 8;
  }

  function removeOption(btn) {
    const list = document.getElementById('options-list');
    if (list.children.length <= 2) return;
    btn.closest('.option-input-row').remove();
    document.getElementById('add-opt-btn').disabled = false;
  }

  // ── CREATE POLL ───────────────────────────────────────

  async function createPoll() {
    const question = document.getElementById('poll-question').value.trim();
    const options  = Array.from(document.querySelectorAll('#options-list input'))
                         .map(i => i.value.trim()).filter(Boolean);
    const msgEl    = document.getElementById('form-msg');
    msgEl.className = 'form-msg';

    if (!question)       { msgEl.className = 'form-msg error'; msgEl.textContent = 'Question is required.'; return; }
    if (options.length < 2) { msgEl.className = 'form-msg error'; msgEl.textContent = 'At least 2 options required.'; return; }

    const btn = document.querySelector('.submit-btn');
    btn.disabled = true; btn.textContent = 'Creating…';

    try {
      const r = await fetch(`${API}/api/polls`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'x-admin-token': adminToken },
        body: JSON.stringify({ question, options }),
      });
      if (!r.ok) {
        const e = await r.json();
        if (r.status === 403) {
          // Bad token — re-lock
          adminToken = '';
          document.getElementById('token-gate').style.display = 'block';
          document.getElementById('create-form').classList.remove('visible');
          document.getElementById('token-error').style.display = 'block';
          return;
        }
        throw new Error(e.detail || `HTTP ${r.status}`);
      }
      msgEl.className = 'form-msg success'; msgEl.textContent = '✓ Poll created!';
      document.getElementById('poll-question').value = '';
      document.querySelectorAll('#options-list input').forEach(i => i.value = '');
      loadPolls();
    } catch(e) {
      msgEl.className = 'form-msg error'; msgEl.textContent = e.message;
    }

    btn.disabled = false; btn.textContent = 'Create Poll';
  }

  // ── VOTE ─────────────────────────────────────────────

  async function vote(pollId, optionId) {
    if (votedPolls[pollId]) return; // already voted
    try {
      const r = await fetch(`${API}/api/polls/${pollId}/vote`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ option_id: optionId }),
      });
      if (!r.ok) { const e = await r.json(); throw new Error(e.detail); }
      const poll = await r.json();
      votedPolls[pollId] = optionId;
      localStorage.setItem('votedPolls', JSON.stringify(votedPolls));
      renderPollCard(poll, true);
    } catch(e) {
      console.error(e);
    }
  }

  // ── CLOSE POLL (admin) ────────────────────────────────

  async function closePoll(pollId) {
    if (!confirm('Close this poll?')) return;
    try {
      const r = await fetch(`${API}/api/polls/${pollId}`, {
        method: 'DELETE',
        headers: { 'x-admin-token': adminToken },
      });
      if (!r.ok) throw new Error('Failed to close poll.');
      loadPolls();
    } catch(e) { alert(e.message); }
  }

  // ── RENDER ────────────────────────────────────────────

  function renderPollCard(poll, replace = false) {
    const voted      = votedPolls[poll.id];
    const hasVoted   = !!voted;
    const isAdmin    = !!adminToken;

    const optionsHTML = poll.options.map(opt => {
      const isMyVote = voted === opt.id;
      return `
        <button class="option-btn ${isMyVote ? 'voted' : ''}" onclick="vote(${poll.id}, ${opt.id})"
                ${hasVoted ? 'disabled' : ''}>
          <div class="option-bar-wrap">
            <div class="option-fill" style="width:${hasVoted ? opt.percent : 0}%"></div>
            <div class="option-content">
              <span class="option-label">${escHtml(opt.label)}</span>
              <div class="option-stats">
                ${hasVoted ? `<span class="option-votes">${opt.votes} vote${opt.votes !== 1 ? 's' : ''}</span>
                              <span class="option-pct">${opt.percent}%</span>` : ''}
                ${isMyVote ? '<span class="voted-check">✓</span>' : ''}
              </div>
            </div>
          </div>
        </button>`;
    }).join('');

    const html = `
      <div class="poll-card" id="poll-${poll.id}">
        <p class="poll-question">${escHtml(poll.question)}</p>
        ${hasVoted ? `<p class="poll-total">${poll.total_votes} vote${poll.total_votes !== 1 ? 's' : ''} total</p>` : ''}
        <div class="poll-options">${optionsHTML}</div>
        ${hasVoted ? '<p class="vote-msg visible">✓ Your vote has been recorded!</p>' : ''}
        <div class="poll-footer">
          <span class="poll-date">${new Date(poll.created_at).toLocaleDateString('en-GB', {day:'numeric',month:'short',year:'numeric'})}</span>
          ${isAdmin ? `<button class="poll-close-btn" onclick="closePoll(${poll.id})">Close poll</button>` : ''}
        </div>
      </div>`;

    if (replace) {
      const existing = document.getElementById(`poll-${poll.id}`);
      if (existing) {
        existing.outerHTML = html;
        // Animate bars after replace
        setTimeout(() => {
          const card = document.getElementById(`poll-${poll.id}`);
          card?.querySelectorAll('.option-fill').forEach((el, i) => {
            el.style.width = poll.options[i]?.percent + '%';
          });
        }, 50);
        return;
      }
    }

    const list = document.getElementById('polls-list');
    const temp = document.createElement('div');
    temp.innerHTML = html;
    list.appendChild(temp.firstElementChild);

    // Animate bars if already voted
    if (hasVoted) {
      setTimeout(() => {
        const card = document.getElementById(`poll-${poll.id}`);
        card?.querySelectorAll('.option-fill').forEach((el, i) => {
          el.style.width = poll.options[i]?.percent + '%';
        });
      }, 100);
    }
  }

  // ── LOAD ─────────────────────────────────────────────

  async function loadPolls() {
    document.getElementById('polls-loading').style.display = 'block';
    document.getElementById('polls-list').innerHTML = '';
    try {
      const r     = await fetch(`${API}/api/polls`);
      const polls = await r.json();
      document.getElementById('polls-loading').style.display = 'none';
      if (!polls.length) {
        document.getElementById('polls-list').innerHTML = '<div class="polls-empty">No active polls right now. Check back soon!</div>';
        return;
      }
      polls.forEach(p => renderPollCard(p));
    } catch {
      document.getElementById('polls-loading').style.display = 'none';
      document.getElementById('polls-list').innerHTML = '<div class="error-msg">⚠️ Could not connect to backend.</div>';
    }
  }

  function escHtml(str) {
    return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  // Init
  loadPolls();
</script>
</body>
</html>
