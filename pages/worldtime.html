<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>World Time · API Ninjas Hub</title>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=DM+Sans:wght@300;400&display=swap" rel="stylesheet"/>
<style>
  *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
  body { min-height:100vh; background:#020a0f; color:#a0f0d8; font-family:'DM Sans',sans-serif; background-image:radial-gradient(ellipse at 50% 50%,rgba(6,182,212,0.06) 0%,transparent 70%); overflow-x:hidden; }
  .back { position:fixed; top:14px; left:14px; z-index:100; text-decoration:none; color:#06b6d4; font-size:0.78rem; letter-spacing:0.1em; text-transform:uppercase; background:rgba(2,10,15,0.85); padding:7px 14px; border-radius:100px; border:1px solid rgba(6,182,212,0.25); backdrop-filter:blur(8px); }

  header { text-align:center; padding:72px 16px 36px; }
  h1 { font-family:'Share Tech Mono',monospace; font-size:clamp(1.7rem,6vw,4rem); color:#06b6d4; text-shadow:0 0 30px rgba(6,182,212,0.35); line-height:1.1; }

  /* Live local clock */
  .clock-local { font-family:'Share Tech Mono',monospace; font-size:clamp(2rem,10vw,3.8rem); text-align:center; color:#a0f0d8; margin-top:16px; letter-spacing:0.05em; text-shadow:0 0 18px rgba(0,212,170,0.3); }
  .local-label { text-align:center; color:rgba(160,240,216,0.38); font-size:0.72rem; letter-spacing:0.2em; text-transform:uppercase; margin-top:6px; }

  /* Search */
  .search-box { display:flex; gap:8px; max-width:460px; margin:24px auto 0; padding:0 4px; }
  .search-box input { flex:1; min-width:0; padding:11px 15px; background:rgba(6,182,212,0.05); border:1px solid rgba(6,182,212,0.2); border-radius:8px; color:#a0f0d8; font-family:'Share Tech Mono',monospace; font-size:0.85rem; outline:none; }
  .search-box input::placeholder { color:rgba(160,240,216,0.3); }
  .search-box button { padding:11px 20px; background:transparent; border:1px solid #06b6d4; border-radius:8px; color:#06b6d4; font-family:'Share Tech Mono',monospace; cursor:pointer; transition:all 0.2s; white-space:nowrap; font-size:0.85rem; flex-shrink:0; }
  .search-box button:hover { background:#06b6d4; color:#020a0f; }

  /* Result card */
  .result { max-width:560px; margin:32px auto; padding:0 16px 80px; }
  .time-card { background:rgba(6,182,212,0.04); border:1px solid rgba(6,182,212,0.15); border-radius:16px; padding:32px 24px; text-align:center; opacity:0; animation:glow 0.45s ease forwards; }
  @keyframes glow { to{opacity:1} from{opacity:0} }

  .city-label { font-family:'Share Tech Mono',monospace; font-size:clamp(0.75rem,2.5vw,0.95rem); color:rgba(160,240,216,0.45); text-transform:uppercase; letter-spacing:0.18em; margin-bottom:4px; }
  .timezone-label { font-size:0.75rem; color:rgba(160,240,216,0.28); margin-bottom:12px; }
  .remote-time { font-family:'Share Tech Mono',monospace; font-size:clamp(2.8rem,12vw,4.5rem); color:#06b6d4; text-shadow:0 0 28px rgba(6,182,212,0.45); margin:8px 0; line-height:1; }
  .remote-date { font-family:'Share Tech Mono',monospace; font-size:clamp(0.75rem,2.5vw,0.95rem); color:rgba(160,240,216,0.45); margin-top:6px; }
  .coords { margin-top:14px; display:inline-flex; gap:16px; }
  .coord-chip { padding:4px 12px; background:rgba(6,182,212,0.08); border:1px solid rgba(6,182,212,0.15); border-radius:100px; font-family:'Share Tech Mono',monospace; font-size:0.72rem; color:rgba(160,240,216,0.4); }

  .loading { text-align:center; padding:60px 16px; color:rgba(6,182,212,0.4); font-family:'Share Tech Mono',monospace; font-size:0.85rem; }
  .error { background:rgba(239,68,68,0.08); border:1px solid rgba(239,68,68,0.2); border-radius:12px; padding:20px; text-align:center; color:#ef4444; font-size:0.88rem; }
</style>
</head>
<body>
<a href="../index.html" class="back">← Hub</a>
<header>
  <h1>🕐 World Time</h1>
  <div class="clock-local" id="local-clock">00:00:00</div>
  <div class="local-label">Your local time</div>
  <div class="search-box">
    <input type="text" id="q" placeholder="e.g. Tokyo, New York, Paris..." value="Tokyo"/>
    <button onclick="load()">Query</button>
  </div>
</header>
<div class="result" id="content">
  <div class="loading">Enter a city and press Query</div>
</div>
<script src="../js/config.js"></script>
<script>
  const API = CONFIG.API_URL; 

  // Live local clock
  function tick() {
    document.getElementById('local-clock').textContent =
      new Date().toLocaleTimeString('en', {hour:'2-digit', minute:'2-digit', second:'2-digit'});
  }
  setInterval(tick, 1000); tick();

  function pad(n) { return String(n ?? '--').padStart(2, '0'); }

  async function load() {
    const q = document.getElementById('q').value.trim();
    if (!q) return;
    const c = document.getElementById('content');
    c.innerHTML = '<div class="loading">Geocoding city and querying time...</div>';
    try {
      const r = await fetch(`${API}/api/worldtime?city=${encodeURIComponent(q)}`);
      const d = await r.json();

      if (d.error) {
        c.innerHTML = `<div class="error">⚠️ ${d.error}</div>`;
        return;
      }

      const hh = pad(d.hour), mm = pad(d.minute), ss = pad(d.second);
      const cityName = d.city || q;
      const timezone = d.timezone || '';
      const dateStr = d.day_of_week ? `${d.day_of_week}, ${d.date || ''}` : (d.date || '');

      c.innerHTML = `
        <div class="time-card">
          <div class="city-label">📍 ${cityName}</div>
          <div class="timezone-label">${timezone}</div>
          <div class="remote-time">${hh}:${mm}:${ss}</div>
          <div class="remote-date">${dateStr}</div>
          ${(d.latitude || d.longitude) ? `
          <div class="coords">
            <span class="coord-chip">LAT ${Number(d.latitude).toFixed(4)}</span>
            <span class="coord-chip">LON ${Number(d.longitude).toFixed(4)}</span>
          </div>` : ''}
        </div>`;
    } catch (e) {
      c.innerHTML = '<div class="error">Error connecting to backend. Make sure it is running.</div>';
    }
  }

  document.getElementById('q').addEventListener('keypress', e => e.key === 'Enter' && load());
  load();
</script>
</body>
</html>
