<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Lucía · Tu Compañera Digital</title>
<link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,600;1,400&family=Nunito:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
<style>
  :root {
    --bg:       #fdf8f3;
    --surface:  #ffffff;
    --border:   rgba(180,120,60,0.15);
    --warm:     #c2773a;
    --warm2:    #e8a96a;
    --warm-lt:  #fef3e8;
    --green:    #2d7d52;
    --ink:      #2c2016;
    --muted:    rgba(44,32,22,0.45);
    --lucia-bg: #fef3e8;
    --user-bg:  #f0f9f4;
    --shadow:   0 4px 24px rgba(194,119,58,0.1);
  }
  *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
  html, body { height:100%; }
  body { background:var(--bg); color:var(--ink); font-family:'Nunito',sans-serif; display:flex; flex-direction:column; overflow:hidden; }
  body::before { content:''; position:fixed; inset:0;
    background:radial-gradient(ellipse at 20% 10%, rgba(232,169,106,0.1) 0%, transparent 55%),
               radial-gradient(ellipse at 85% 90%, rgba(194,119,58,0.06) 0%, transparent 50%);
    pointer-events:none; z-index:0; }

  /* ── TOP BAR ── */
  .topbar { display:flex; align-items:center; gap:14px; padding:14px 20px; background:rgba(255,255,255,0.97); border-bottom:1px solid var(--border); z-index:10; flex-shrink:0; box-shadow:0 2px 12px rgba(194,119,58,0.08); }
  .back { text-decoration:none; color:var(--warm); font-size:0.82rem; letter-spacing:0.1em; text-transform:uppercase; font-weight:700; flex-shrink:0; }

  .lucia-avatar { width:48px; height:48px; border-radius:50%; background:linear-gradient(135deg,var(--warm2),var(--warm)); display:flex; align-items:center; justify-content:center; font-size:1.5rem; flex-shrink:0; box-shadow:0 4px 12px rgba(194,119,58,0.3); }
  .lucia-info { flex:1; }
  .lucia-name { font-weight:700; font-size:1.1rem; color:var(--ink); }
  .lucia-sub  { font-size:0.78rem; color:var(--muted); margin-top:1px; }
  .lucia-dot  { display:inline-block; width:7px; height:7px; background:#22c55e; border-radius:50%; margin-right:5px; animation:blink 2s infinite; }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:.3} }

  .font-ctrl { display:flex; align-items:center; gap:8px; }
  .font-label { font-size:0.75rem; color:var(--muted); }
  .font-btn { width:34px; height:34px; background:var(--bg); border:1px solid var(--border); border-radius:8px; font-family:'Nunito',sans-serif; font-size:1rem; cursor:pointer; color:var(--warm); transition:all 0.2s; font-weight:700; display:flex; align-items:center; justify-content:center; }
  .font-btn:hover { background:var(--warm-lt); border-color:var(--warm); }

  /* ── ONBOARDING ── */
  .onboarding { position:fixed; inset:0; background:rgba(44,32,22,0.5); backdrop-filter:blur(4px); z-index:50; display:flex; align-items:center; justify-content:center; padding:16px; }
  .onboarding-card { background:var(--surface); border-radius:24px; padding:clamp(28px,5vw,44px); max-width:480px; width:100%; box-shadow:0 20px 60px rgba(44,32,22,0.2); text-align:center; }
  .ob-icon { font-size:3.5rem; margin-bottom:16px; }
  .ob-title { font-family:'Lora',serif; font-size:clamp(1.5rem,5vw,2rem); font-weight:600; color:var(--ink); margin-bottom:10px; line-height:1.2; }
  .ob-text { font-size:clamp(0.95rem,3vw,1.05rem); color:var(--muted); line-height:1.7; margin-bottom:24px; }
  .ob-input { width:100%; padding:14px 18px; background:var(--bg); border:2px solid var(--border); border-radius:14px; font-family:'Nunito',sans-serif; font-size:clamp(1rem,3vw,1.1rem); color:var(--ink); outline:none; text-align:center; transition:border-color 0.2s; margin-bottom:16px; }
  .ob-input:focus { border-color:var(--warm); }
  .ob-input::placeholder { color:var(--muted); }
  .ob-btn { width:100%; padding:15px; background:linear-gradient(135deg,var(--warm),var(--warm2)); border:none; border-radius:14px; color:#fff; font-family:'Nunito',sans-serif; font-size:clamp(1rem,3vw,1.1rem); font-weight:700; cursor:pointer; transition:all 0.25s; }
  .ob-btn:hover { transform:translateY(-2px); box-shadow:0 8px 24px rgba(194,119,58,0.35); }
  .ob-skip { margin-top:10px; background:none; border:none; color:var(--muted); font-size:0.85rem; cursor:pointer; font-family:'Nunito',sans-serif; text-decoration:underline; }

  /* ── MESSAGES ── */
  .messages { flex:1; overflow-y:auto; padding:clamp(16px,4vw,28px); display:flex; flex-direction:column; gap:18px; position:relative; z-index:1; }
  .messages::-webkit-scrollbar { width:4px; }
  .messages::-webkit-scrollbar-thumb { background:rgba(194,119,58,0.2); border-radius:2px; }

  /* Bubbles */
  .msg { display:flex; gap:12px; max-width:82%; animation:msgIn 0.35s ease forwards; opacity:0; }
  @keyframes msgIn { to{opacity:1;transform:translateY(0)} from{opacity:0;transform:translateY(10px)} }
  .msg.lucia { align-self:flex-start; }
  .msg.user  { align-self:flex-end; flex-direction:row-reverse; }

  .msg-avatar { width:clamp(38px,7vw,46px); height:clamp(38px,7vw,46px); border-radius:50%; flex-shrink:0; display:flex; align-items:center; justify-content:center; font-size:clamp(1.1rem,3vw,1.4rem); margin-top:2px; }
  .msg-avatar.lucia-av { background:linear-gradient(135deg,var(--warm2),var(--warm)); box-shadow:0 2px 10px rgba(194,119,58,0.3); }
  .msg-avatar.user-av  { background:#e8f5ee; }

  .msg-wrap { display:flex; flex-direction:column; gap:4px; }
  .msg-name { font-size:clamp(0.68rem,2vw,0.75rem); text-transform:uppercase; letter-spacing:0.1em; color:var(--muted); font-weight:600; }
  .msg.user .msg-name { text-align:right; }

  .bubble { padding:clamp(13px,3vw,18px) clamp(16px,4vw,22px); border-radius:18px; line-height:1.75; }
  .msg.lucia .bubble { background:var(--lucia-bg); border:1px solid rgba(194,119,58,0.15); border-bottom-left-radius:6px; font-size:clamp(1rem,2.8vw,1.12rem); color:var(--ink); }
  .msg.user  .bubble { background:var(--user-bg); border:1px solid rgba(45,125,82,0.18); border-bottom-right-radius:6px; font-size:clamp(1rem,2.8vw,1.12rem); color:var(--ink); }

  /* Typing */
  .typing-wrap { display:flex; gap:12px; align-items:center; align-self:flex-start; opacity:0; transition:opacity 0.3s; }
  .typing-wrap.visible { opacity:1; }
  .typing-av { width:46px; height:46px; border-radius:50%; background:linear-gradient(135deg,var(--warm2),var(--warm)); flex-shrink:0; display:flex; align-items:center; justify-content:center; font-size:1.4rem; }
  .typing-dots { display:flex; gap:5px; padding:14px 18px; background:var(--lucia-bg); border:1px solid rgba(194,119,58,0.15); border-radius:18px; border-bottom-left-radius:6px; }
  .typing-dots span { width:8px; height:8px; background:var(--warm2); border-radius:50%; animation:dot 1.2s ease-in-out infinite; }
  .typing-dots span:nth-child(2){animation-delay:.2s} .typing-dots span:nth-child(3){animation-delay:.4s}
  @keyframes dot { 0%,100%{transform:translateY(0);opacity:.4} 50%{transform:translateY(-6px);opacity:1} }

  /* Suggested topics */
  .suggestions { align-self:center; display:flex; flex-wrap:wrap; gap:8px; justify-content:center; max-width:500px; padding:4px 0; }
  .sug-btn { padding:10px 18px; background:var(--surface); border:1px solid var(--border); border-radius:100px; font-size:clamp(0.85rem,2.5vw,0.95rem); color:var(--warm); cursor:pointer; transition:all 0.2s; font-family:'Nunito',sans-serif; font-weight:600; }
  .sug-btn:hover { background:var(--warm-lt); border-color:var(--warm); }

  /* ── INPUT ── */
  .input-bar { padding:clamp(12px,3vw,18px) clamp(14px,4vw,24px); border-top:1px solid var(--border); background:rgba(255,255,255,0.97); flex-shrink:0; box-shadow:0 -2px 12px rgba(194,119,58,0.06); }
  .input-row { display:flex; gap:10px; align-items:flex-end; }
  .input-row textarea { flex:1; padding:clamp(12px,3vw,15px) clamp(14px,3vw,18px); background:var(--bg); border:2px solid var(--border); border-radius:16px; font-family:'Nunito',sans-serif; font-size:clamp(1rem,3vw,1.08rem); color:var(--ink); outline:none; resize:none; max-height:120px; line-height:1.5; transition:border-color 0.2s; }
  .input-row textarea:focus { border-color:var(--warm); background:#fff; }
  .input-row textarea::placeholder { color:var(--muted); }
  .send-btn { width:clamp(44px,8vw,52px); height:clamp(44px,8vw,52px); background:linear-gradient(135deg,var(--warm),var(--warm2)); border:none; border-radius:14px; color:#fff; font-size:1.3rem; cursor:pointer; transition:all 0.2s; flex-shrink:0; display:flex; align-items:center; justify-content:center; box-shadow:0 4px 12px rgba(194,119,58,0.3); }
  .send-btn:hover { transform:translateY(-2px); box-shadow:0 8px 20px rgba(194,119,58,0.4); }
  .send-btn:disabled { opacity:.4; cursor:not-allowed; transform:none; box-shadow:none; }
  .input-hint { font-size:clamp(0.72rem,2vw,0.8rem); color:var(--muted); margin-top:6px; text-align:center; }
</style>
</head>
<body>

<!-- Onboarding -->
<div class="onboarding" id="onboarding">
  <div class="onboarding-card">
    <div class="ob-icon">💛</div>
    <div class="ob-title">Hola, soy Lucía</div>
    <p class="ob-text">Soy tu compañera digital. Estoy aquí para charlar, escucharte y hacerte compañía cuando lo necesites. ¿Cómo te llamas?</p>
    <input type="text" class="ob-input" id="name-input" placeholder="Escribe tu nombre aquí…" maxlength="50"/>
    <button class="ob-btn" onclick="startSession()">Encantada de conocerte 💛</button>
    <br/><button class="ob-skip" onclick="startSession(true)">Prefiero no decir mi nombre</button>
  </div>
</div>

<!-- Top bar -->
<div class="topbar">
  <a href="../index.html" class="back">← Volver</a>
  <div class="lucia-avatar">👵</div>
  <div class="lucia-info">
    <div class="lucia-name">Lucía</div>
    <div class="lucia-sub"><span class="lucia-dot"></span>Tu compañera digital · Siempre disponible</div>
  </div>
  <div class="font-ctrl">
    <span class="font-label">Letra</span>
    <button class="font-btn" onclick="changeFont(-2)">A−</button>
    <button class="font-btn" onclick="changeFont(2)">A+</button>
  </div>
</div>

<div class="messages" id="messages">
  <div class="typing-wrap" id="typing">
    <div class="typing-av">👵</div>
    <div class="typing-dots"><span></span><span></span><span></span></div>
  </div>
</div>

<div class="input-bar">
  <div class="input-row">
    <textarea id="input" rows="1" placeholder="Escribe aquí lo que quieras contarme…"></textarea>
    <button class="send-btn" id="send-btn" onclick="send()">➤</button>
  </div>
  <div class="input-hint">Pulsa Enter para enviar · Shift+Enter para nueva línea</div>
</div>

<script src="../js/config.js"></script>
<script>
  const API = CONFIG.API_URL; 
  let history = [], isThinking = false, userName = null;
  let baseFontSize = 16;

  const messagesEl = document.getElementById('messages');
  const inputEl    = document.getElementById('input');
  const typingEl   = document.getElementById('typing');

  inputEl.addEventListener('input', () => {
    inputEl.style.height = 'auto';
    inputEl.style.height = Math.min(inputEl.scrollHeight, 120) + 'px';
  });
  inputEl.addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); send(); }
  });

  // Allow pressing Enter in onboarding input
  document.getElementById('name-input').addEventListener('keydown', e => {
    if (e.key === 'Enter') startSession();
  });

  function changeFont(delta) {
    baseFontSize = Math.min(26, Math.max(14, baseFontSize + delta));
    document.querySelectorAll('.bubble').forEach(el => el.style.fontSize = baseFontSize + 'px');
    inputEl.style.fontSize = baseFontSize + 'px';
  }

  function scrollBottom() { messagesEl.scrollTop = messagesEl.scrollHeight; }

  function startSession(skip = false) {
    const nameInput = document.getElementById('name-input').value.trim();
    userName = skip ? null : (nameInput || null);
    document.getElementById('onboarding').style.display = 'none';
    // Send first message to get Lucía's greeting
    sendToAPI([{ role: 'user', content: userName
      ? `Hola Lucía, me llamo ${userName}.`
      : 'Hola Lucía.' }], true);
  }

  function appendMsg(role, content) {
    const isLucia = role === 'assistant';
    const div = document.createElement('div');
    div.className = `msg ${isLucia ? 'lucia' : 'user'}`;
    div.innerHTML = `
      <div class="msg-avatar ${isLucia ? 'lucia-av' : 'user-av'}">${isLucia ? '👵' : '🧑'}</div>
      <div class="msg-wrap">
        <div class="msg-name">${isLucia ? 'Lucía' : (userName || 'Tú')}</div>
        <div class="bubble" style="font-size:${baseFontSize}px">${escHtml(content).replace(/\n/g,'<br>')}</div>
      </div>`;
    messagesEl.insertBefore(div, typingEl);

    // Add topic suggestions after Lucía's first reply
    if (isLucia && history.length <= 2) addSuggestions();

    scrollBottom();
  }

  function addSuggestions() {
    // Remove existing suggestions
    document.querySelectorAll('.suggestions').forEach(el => el.remove());
    const div = document.createElement('div');
    div.className = 'suggestions';
    const topics = [
      '🌤 ¿Cómo está el tiempo hoy?',
      '👨‍👩‍👧 Cuéntame de tu familia',
      '🌿 ¿Tienes algún hobby?',
      '🍳 ¿Qué has comido hoy?',
      '📺 ¿Has visto algo bueno?',
      '🌸 ¿Cómo te encuentras hoy?',
    ];
    div.innerHTML = topics.map(t =>
      `<button class="sug-btn" onclick="sendSuggestion('${t.replace(/'/g,"\\\'")}')">${t}</button>`
    ).join('');
    messagesEl.insertBefore(div, typingEl);
    scrollBottom();
  }

  function setThinking(val) {
    isThinking = val;
    typingEl.classList.toggle('visible', val);
    document.getElementById('send-btn').disabled = val;
    if (val) scrollBottom();
  }

  async function sendToAPI(msgs, isInit = false) {
    setThinking(true);
    try {
      const r = await fetch(`${API}/api/companion`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ messages: msgs, user_name: userName }),
      });
      if (!r.ok) { const e = await r.json(); throw new Error(e.detail || `HTTP ${r.status}`); }
      const data = await r.json();
      setThinking(false);
      if (!isInit) appendMsg('user', msgs[msgs.length - 1].content);
      appendMsg('assistant', data.reply);
      history = msgs;
      history.push({ role: 'assistant', content: data.reply });
    } catch(e) {
      setThinking(false);
      appendMsg('assistant', 'Ay, ha habido un pequeño problema técnico. ¿Puedes intentarlo de nuevo?');
    }
  }

  async function send() {
    const text = inputEl.value.trim();
    if (!text || isThinking) return;
    inputEl.value = ''; inputEl.style.height = 'auto';
    // Remove suggestions when user writes
    document.querySelectorAll('.suggestions').forEach(el => el.remove());
    appendMsg('user', text);
    const newHistory = [...history, { role: 'user', content: text }];
    history = newHistory;
    setThinking(true);
    try {
      const r = await fetch(`${API}/api/companion`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ messages: history, user_name: userName }),
      });
      if (!r.ok) { const e = await r.json(); throw new Error(e.detail); }
      const data = await r.json();
      setThinking(false);
      appendMsg('assistant', data.reply);
      history.push({ role: 'assistant', content: data.reply });
    } catch(e) {
      setThinking(false);
      appendMsg('assistant', 'Ay, ha habido un pequeño problema técnico. ¿Puedes intentarlo de nuevo?');
    }
  }

  function sendSuggestion(text) {
    inputEl.value = text;
    send();
  }

  function escHtml(str) {
    return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }
</script>
</body>
</html>
