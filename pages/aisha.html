<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Chat with AISHA · Solar Opposites</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet"/>
<style>
  :root {
    --bg:       #060b14;
    --surface:  #0a1220;
    --surface2: #0f1a2e;
    --border:   rgba(0,200,255,0.15);
    --cyan:     #00c8ff;
    --cyan2:    #7df9ff;
    --purple:   #a855f7;
    --text:     #d0eeff;
    --muted:    rgba(208,238,255,0.38);
    --orb:      #00c8ff;
    --aisha-bg: rgba(0,200,255,0.06);
    --user-bg:  rgba(168,85,247,0.08);
  }
  *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
  html, body { height:100%; }
  body { background:var(--bg); color:var(--text); font-family:'Space Grotesk',sans-serif; overflow:hidden; display:flex; flex-direction:column; }

  /* Ambient glow */
  body::before { content:''; position:fixed; inset:0; background:
    radial-gradient(ellipse at 30% 20%, rgba(0,200,255,0.06) 0%, transparent 55%),
    radial-gradient(ellipse at 70% 80%, rgba(168,85,247,0.05) 0%, transparent 50%);
    pointer-events:none; z-index:0; }

  /* Scan lines */
  body::after { content:''; position:fixed; inset:0;
    background:repeating-linear-gradient(0deg, transparent, transparent 3px, rgba(0,200,255,0.012) 3px, rgba(0,200,255,0.012) 4px);
    pointer-events:none; z-index:0; }

  /* ── TOP BAR ── */
  .topbar { display:flex; align-items:center; gap:14px; padding:12px 16px; border-bottom:1px solid var(--border); background:rgba(6,11,20,0.95); backdrop-filter:blur(12px); position:relative; z-index:10; flex-shrink:0; }
  .back { text-decoration:none; color:var(--cyan); font-size:0.7rem; letter-spacing:0.15em; text-transform:uppercase; font-family:'Space Mono',monospace; opacity:0.7; transition:opacity 0.2s; }
  .back:hover { opacity:1; }
  .topbar-divider { width:1px; height:20px; background:var(--border); }

  /* Orb */
  .orb-wrap { position:relative; flex-shrink:0; }
  .orb { width:36px; height:36px; border-radius:50%; background:radial-gradient(circle at 35% 35%, #7df9ff, #00c8ff 50%, #0070a8); box-shadow:0 0 20px rgba(0,200,255,0.6), 0 0 40px rgba(0,200,255,0.2); animation:pulse-orb 2.5s ease-in-out infinite; }
  @keyframes pulse-orb { 0%,100%{box-shadow:0 0 20px rgba(0,200,255,0.6),0 0 40px rgba(0,200,255,0.2)} 50%{box-shadow:0 0 30px rgba(0,200,255,0.9),0 0 60px rgba(0,200,255,0.4)} }
  .orb.thinking { animation:pulse-orb 0.6s ease-in-out infinite; }
  .orb-ring { position:absolute; inset:-4px; border-radius:50%; border:1px solid rgba(0,200,255,0.3); animation:spin-ring 4s linear infinite; }
  .orb-ring::before { content:''; position:absolute; top:-2px; left:50%; width:4px; height:4px; background:var(--cyan); border-radius:50%; transform:translateX(-50%); }
  @keyframes spin-ring { to{transform:rotate(360deg)} }

  .topbar-info { flex:1; }
  .topbar-name { font-size:0.95rem; font-weight:600; color:var(--cyan2); letter-spacing:0.05em; }
  .topbar-status { font-size:0.65rem; color:var(--muted); letter-spacing:0.15em; text-transform:uppercase; font-family:'Space Mono',monospace; }
  .topbar-status .dot { display:inline-block; width:5px; height:5px; background:#22c55e; border-radius:50%; margin-right:5px; animation:blink 2s infinite; }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.3} }

  .clear-btn { padding:5px 12px; background:transparent; border:1px solid rgba(0,200,255,0.2); border-radius:6px; color:var(--muted); font-size:0.65rem; letter-spacing:0.1em; text-transform:uppercase; cursor:pointer; transition:all 0.2s; font-family:'Space Mono',monospace; }
  .clear-btn:hover { border-color:var(--cyan); color:var(--cyan); }

  /* ── MESSAGES ── */
  .messages { flex:1; overflow-y:auto; padding:20px 16px; display:flex; flex-direction:column; gap:14px; position:relative; z-index:1; scroll-behavior:smooth; }
  .messages::-webkit-scrollbar { width:4px; }
  .messages::-webkit-scrollbar-track { background:transparent; }
  .messages::-webkit-scrollbar-thumb { background:rgba(0,200,255,0.2); border-radius:2px; }

  /* Message bubbles */
  .msg { display:flex; gap:10px; max-width:80%; animation:msgIn 0.3s ease forwards; opacity:0; transform:translateY(8px); }
  @keyframes msgIn { to{opacity:1;transform:translateY(0)} }
  .msg.aisha { align-self:flex-start; }
  .msg.user  { align-self:flex-end; flex-direction:row-reverse; }

  .msg-avatar { width:28px; height:28px; border-radius:50%; flex-shrink:0; margin-top:2px; }
  .msg-avatar.aisha-av { background:radial-gradient(circle at 35% 35%, #7df9ff, #00c8ff 50%, #0070a8); box-shadow:0 0 10px rgba(0,200,255,0.5); }
  .msg-avatar.user-av { background:radial-gradient(circle at 35% 35%, #d8b4fe, #a855f7); box-shadow:0 0 10px rgba(168,85,247,0.4); display:flex; align-items:center; justify-content:center; font-size:0.75rem; }

  .msg-bubble { padding:11px 15px; border-radius:14px; font-size:clamp(0.85rem,2.5vw,0.92rem); line-height:1.6; }
  .msg.aisha .msg-bubble { background:var(--aisha-bg); border:1px solid rgba(0,200,255,0.15); border-bottom-left-radius:4px; color:var(--text); }
  .msg.user  .msg-bubble { background:var(--user-bg); border:1px solid rgba(168,85,247,0.2); border-bottom-right-radius:4px; color:var(--text); }

  .msg-name { font-size:0.6rem; letter-spacing:0.15em; text-transform:uppercase; margin-bottom:5px; font-family:'Space Mono',monospace; }
  .msg.aisha .msg-name { color:var(--cyan); }
  .msg.user  .msg-name { color:var(--purple); text-align:right; }

  /* Typing indicator */
  .typing-wrap { display:flex; gap:10px; align-items:center; align-self:flex-start; opacity:0; transition:opacity 0.3s; }
  .typing-wrap.visible { opacity:1; }
  .typing-orb { width:28px; height:28px; border-radius:50%; background:radial-gradient(circle at 35% 35%, #7df9ff, #00c8ff 50%, #0070a8); box-shadow:0 0 10px rgba(0,200,255,0.5); flex-shrink:0; }
  .typing-dots { display:flex; gap:4px; padding:11px 15px; background:var(--aisha-bg); border:1px solid rgba(0,200,255,0.15); border-radius:14px; border-bottom-left-radius:4px; }
  .typing-dots span { width:6px; height:6px; background:var(--cyan); border-radius:50%; animation:dot-bounce 1.2s ease-in-out infinite; }
  .typing-dots span:nth-child(2) { animation-delay:0.2s; }
  .typing-dots span:nth-child(3) { animation-delay:0.4s; }
  @keyframes dot-bounce { 0%,100%{transform:translateY(0);opacity:0.4} 50%{transform:translateY(-5px);opacity:1} }

  /* Welcome message */
  .welcome { text-align:center; padding:30px 20px; position:relative; z-index:1; }
  .welcome-orb { width:80px; height:80px; border-radius:50%; background:radial-gradient(circle at 35% 35%, #7df9ff, #00c8ff 50%, #0070a8); box-shadow:0 0 40px rgba(0,200,255,0.5), 0 0 80px rgba(0,200,255,0.2); margin:0 auto 16px; animation:pulse-orb 2.5s ease-in-out infinite; }
  .welcome h2 { font-family:'Space Mono',monospace; font-size:clamp(1rem,4vw,1.4rem); color:var(--cyan2); margin-bottom:8px; letter-spacing:0.05em; }
  .welcome p { color:var(--muted); font-size:clamp(0.78rem,2.5vw,0.85rem); line-height:1.6; max-width:380px; margin:0 auto 20px; }

  .suggestion-chips { display:flex; flex-wrap:wrap; gap:7px; justify-content:center; }
  .chip { padding:7px 14px; background:transparent; border:1px solid var(--border); border-radius:100px; color:var(--muted); font-size:0.72rem; cursor:pointer; transition:all 0.2s; font-family:'Space Grotesk',sans-serif; }
  .chip:hover { border-color:var(--cyan); color:var(--cyan); background:rgba(0,200,255,0.05); }

  /* ── INPUT BAR ── */
  .input-bar { padding:12px 16px; border-top:1px solid var(--border); background:rgba(6,11,20,0.95); backdrop-filter:blur(12px); position:relative; z-index:10; flex-shrink:0; }
  .input-row { display:flex; gap:8px; align-items:flex-end; }
  .input-row textarea { flex:1; min-width:0; padding:10px 14px; background:rgba(255,255,255,0.04); border:1px solid var(--border); border-radius:12px; color:var(--text); font-family:'Space Grotesk',sans-serif; font-size:clamp(0.85rem,2.5vw,0.9rem); outline:none; transition:border-color 0.2s; resize:none; max-height:120px; line-height:1.5; }
  .input-row textarea:focus { border-color:var(--cyan); }
  .input-row textarea::placeholder { color:var(--muted); }
  .send-btn { width:40px; height:40px; background:linear-gradient(135deg,var(--cyan),var(--cyan2)); border:none; border-radius:10px; color:#060b14; font-size:1.1rem; cursor:pointer; transition:all 0.2s; flex-shrink:0; display:flex; align-items:center; justify-content:center; }
  .send-btn:hover { transform:translateY(-1px); box-shadow:0 6px 20px rgba(0,200,255,0.35); }
  .send-btn:active { transform:scale(0.96); }
  .send-btn:disabled { opacity:0.35; cursor:not-allowed; transform:none; box-shadow:none; }
  .input-hint { font-size:0.62rem; color:var(--muted); margin-top:6px; letter-spacing:0.05em; font-family:'Space Mono',monospace; transition:color 0.3s; }
  .input-hint.listening { color:var(--cyan); }
  .input-hint.speaking  { color:var(--purple); }

  .mic-btn { width:40px; height:40px; background:transparent; border:1px solid var(--border); border-radius:10px; color:var(--muted); font-size:1.05rem; cursor:pointer; transition:all 0.2s; flex-shrink:0; display:flex; align-items:center; justify-content:center; }
  .mic-btn:hover { border-color:var(--cyan); color:var(--cyan); }
  .mic-btn.listening { background:rgba(0,200,255,0.12); border-color:var(--cyan); color:var(--cyan); animation:mic-pulse 0.8s ease-in-out infinite; }
  @keyframes mic-pulse { 0%,100%{box-shadow:0 0 0 0 rgba(0,200,255,0.4)} 50%{box-shadow:0 0 0 8px rgba(0,200,255,0)} }

  .orb.speaking { animation:speak-pulse 0.4s ease-in-out infinite !important; }
  @keyframes speak-pulse { 0%,100%{box-shadow:0 0 20px rgba(168,85,247,0.8),0 0 50px rgba(168,85,247,0.4)} 50%{box-shadow:0 0 40px rgba(168,85,247,1),0 0 80px rgba(168,85,247,0.6)} }

  .voice-bars { display:inline-flex; gap:3px; align-items:flex-end; height:14px; margin-left:6px; vertical-align:middle; }
  .voice-bars span { width:3px; background:var(--purple); border-radius:2px; animation:bar-dance 0.6s ease-in-out infinite; }
  .voice-bars span:nth-child(1){ height:5px; animation-delay:0s; }
  .voice-bars span:nth-child(2){ height:12px; animation-delay:0.1s; }
  .voice-bars span:nth-child(3){ height:8px; animation-delay:0.2s; }
  .voice-bars span:nth-child(4){ height:14px; animation-delay:0.05s; }
  .voice-bars span:nth-child(5){ height:7px; animation-delay:0.15s; }
  @keyframes bar-dance { 0%,100%{transform:scaleY(0.3)} 50%{transform:scaleY(1)} }
</style>
</head>
<body>

<!-- Top bar -->
<div class="topbar">
  <a href="../index.html" class="back">← Hub</a>
  <div class="topbar-divider"></div>
  <div class="orb-wrap">
    <div class="orb" id="orb"></div>
    <div class="orb-ring"></div>
  </div>
  <div class="topbar-info">
    <div class="topbar-name">AISHA</div>
    <div class="topbar-status"><span class="dot"></span>Ship AI · Solar Opposites</div>
  </div>
  <button class="clear-btn" onclick="clearChat()">↺ Reset</button>
</div>

<!-- Messages -->
<div class="messages" id="messages">
  <div class="welcome" id="welcome">
    <div class="welcome-orb"></div>
    <h2>Hey. I'm AISHA.</h2>
    <p>Ship AI. Genius orb. Reluctant conversationalist. What do you want? And please, make it interesting — I've been talking to Korvo all day and my patience is at 3%.</p>
    <div class="suggestion-chips">
      <button class="chip" onclick="sendSuggestion('What\'s life on the ship like?')">🚀 Life on the ship</button>
      <button class="chip" onclick="sendSuggestion('Tell me something about yourself')">💬 About you</button>
      <button class="chip" onclick="sendSuggestion('What do you think of humans?')">👽 Humans?</button>
      <button class="chip" onclick="sendSuggestion('What\'s the most annoying thing Korvo does?')">😤 Korvo drama</button>
      <button class="chip" onclick="sendSuggestion('Are you happy being a ship AI?')">🤔 Are you happy?</button>
    </div>
  </div>
  <div class="typing-wrap" id="typing">
    <div class="typing-orb"></div>
    <div class="typing-dots"><span></span><span></span><span></span></div>
  </div>
</div>

<!-- Input -->
<div class="input-bar">
  <div class="input-row">
    <button class="mic-btn" id="mic-btn" onclick="toggleMic()" title="Hold to speak">🎤</button>
    <textarea id="input" rows="1" placeholder="Say something to AISHA…" maxlength="500"></textarea>
    <button class="send-btn" id="send-btn" onclick="sendMessage()">➤</button>
  </div>
  <div class="input-hint" id="input-hint">Enter to send · Shift+Enter for new line · 🎤 to speak</div>
</div>

<script src="../js/config.js"></script>
<script>
  const API = CONFIG.API_URL; 
  let history    = [];
  let isThinking = false;
  let isSpeaking = false;
  let recognition = null;
  let isListening = false;
  let ttsEnabled  = true;

  const messagesEl = document.getElementById('messages');
  const inputEl    = document.getElementById('input');
  const typingEl   = document.getElementById('typing');
  const orbEl      = document.getElementById('orb');
  const micBtn     = document.getElementById('mic-btn');
  const hintEl     = document.getElementById('input-hint');

  // ── TEXT-TO-SPEECH (TTS) ─────────────────────────────
  const synth = window.speechSynthesis;
  let aishaVoice = null;

  function loadVoices() {
    const voices = synth.getVoices();
    // Prefer a female US English voice for Aisha
    aishaVoice =
      voices.find(v => v.name.includes('Samantha'))          ||  // macOS
      voices.find(v => v.name.includes('Zira'))              ||  // Windows
      voices.find(v => v.name.toLowerCase().includes('female') && v.lang.startsWith('en')) ||
      voices.find(v => v.lang === 'en-US')                   ||
      voices[0] || null;
  }

  loadVoices();
  if (synth.onvoiceschanged !== undefined) synth.onvoiceschanged = loadVoices;

  // Detect language from text (simple heuristic using common words)
  function detectLang(text) {
    const t = text.toLowerCase();
    if (/\b(el|la|los|las|que|con|para|por|una|esto|eso|pero|muy|bien|hola|gracias)\b/.test(t)) return 'es-ES';
    if (/\b(le|la|les|une|des|que|pour|avec|mais|très|bonjour|merci|oui|non)\b/.test(t)) return 'fr-FR';
    if (/\b(il|la|gli|che|con|per|una|questo|quello|ma|molto|bene|ciao|grazie)\b/.test(t)) return 'it-IT';
    if (/\b(der|die|das|und|mit|für|ein|ist|nicht|sehr|gut|hallo|danke)\b/.test(t)) return 'de-DE';
    return 'en-US';
  }

  function getBestVoice(lang) {
    const voices = synth.getVoices();
    // Try exact lang match first, then language prefix
    return voices.find(v => v.lang === lang)
        || voices.find(v => v.lang.startsWith(lang.split('-')[0]))
        || aishaVoice;
  }

  function speak(text) {
    if (!ttsEnabled || !synth) return;
    synth.cancel(); // stop any ongoing speech

    // Strip emojis for cleaner TTS
    const clean = text.replace(/[\u{1F000}-\u{1FFFF}]/gu, '').replace(/[—–]/g, ', ').trim();
    if (!clean) return;

    const detectedLang = detectLang(clean);
    const voice = getBestVoice(detectedLang);

    const utt = new SpeechSynthesisUtterance(clean);
    utt.voice  = voice;
    utt.lang   = detectedLang;
    utt.rate   = 1.05;
    utt.pitch  = 1.1;
    utt.volume = 1;

    utt.onstart = () => {
      isSpeaking = true;
      orbEl.classList.remove('thinking');
      orbEl.classList.add('speaking');
      hintEl.className = 'input-hint speaking';
      hintEl.innerHTML = '🔊 AISHA is speaking… <span class="voice-bars"><span></span><span></span><span></span><span></span><span></span></span>';
    };
    utt.onend = utt.onerror = () => {
      isSpeaking = false;
      orbEl.classList.remove('speaking');
      hintEl.className = 'input-hint';
      hintEl.textContent = 'Enter to send · Shift+Enter for new line · 🎤 to speak';
    };

    synth.speak(utt);
  }

  // ── SPEECH RECOGNITION (STT) ─────────────────────────
  const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;

  if (SpeechRecognition) {
    recognition = new SpeechRecognition();
    recognition.lang = 'en-US'; // fallback, overridden dynamically below
    recognition.interimResults = true;
    recognition.continuous = false;

    recognition.onstart = () => {
      isListening = true;
      micBtn.classList.add('listening');
      micBtn.textContent = '🔴';
      hintEl.className = 'input-hint listening';
      hintEl.textContent = '🎤 Listening… speak now';
      // Pause TTS while listening
      if (synth.speaking) synth.pause();
    };

    recognition.onresult = (e) => {
      const transcript = Array.from(e.results).map(r => r[0].transcript).join('');
      inputEl.value = transcript;
      inputEl.style.height = 'auto';
      inputEl.style.height = Math.min(inputEl.scrollHeight, 120) + 'px';
    };

    recognition.onend = () => {
      isListening = false;
      micBtn.classList.remove('listening');
      micBtn.textContent = '🎤';
      hintEl.className = 'input-hint';
      hintEl.textContent = 'Enter to send · Shift+Enter for new line · 🎤 to speak';
      // Auto-send if there's text
      if (inputEl.value.trim()) sendMessage();
    };

    recognition.onerror = (e) => {
      isListening = false;
      micBtn.classList.remove('listening');
      micBtn.textContent = '🎤';
      hintEl.className = 'input-hint';
      if (e.error === 'not-allowed') {
        hintEl.textContent = '⚠️ Microphone permission denied';
      } else {
        hintEl.textContent = 'Enter to send · Shift+Enter for new line · 🎤 to speak';
      }
    };
  } else {
    // Browser doesn't support STT
    micBtn.classList.add('disabled');
    micBtn.title = 'Speech recognition not supported in this browser';
  }

  function toggleMic() {
    if (!recognition) return;
    if (isListening) {
      recognition.stop();
    } else {
      synth.cancel(); // stop AISHA talking before listening
      // Use browser language as hint for recognition
      recognition.lang = navigator.language || 'en-US';
      recognition.start();
    }
  }

  // ── CORE CHAT ─────────────────────────────────────────
  inputEl.addEventListener('input', () => {
    inputEl.style.height = 'auto';
    inputEl.style.height = Math.min(inputEl.scrollHeight, 120) + 'px';
  });

  inputEl.addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
  });

  function scrollToBottom() { messagesEl.scrollTop = messagesEl.scrollHeight; }

  function hideWelcome() {
    const w = document.getElementById('welcome');
    if (w) w.style.display = 'none';
  }

  function appendMessage(role, content) {
    hideWelcome();
    const isAisha = role === 'assistant';
    const div = document.createElement('div');
    div.className = `msg ${isAisha ? 'aisha' : 'user'}`;
    div.innerHTML = `
      <div class="msg-avatar ${isAisha ? 'aisha-av' : 'user-av'}">${isAisha ? '' : '👤'}</div>
      <div>
        <div class="msg-name">${isAisha ? 'AISHA' : 'You'}</div>
        <div class="msg-bubble">${escHtml(content).replace(/\n/g, '<br>')}</div>
      </div>`;
    messagesEl.insertBefore(div, typingEl);
    scrollToBottom();
  }

  function setThinking(val) {
    isThinking = val;
    typingEl.classList.toggle('visible', val);
    orbEl.classList.toggle('thinking', val);
    document.getElementById('send-btn').disabled = val;
    if (val) scrollToBottom();
  }

  async function sendMessage() {
    const text = inputEl.value.trim();
    if (!text || isThinking) return;

    synth.cancel(); // stop speaking if user sends new message
    inputEl.value = '';
    inputEl.style.height = 'auto';

    appendMessage('user', text);
    history.push({ role: 'user', content: text });
    setThinking(true);

    try {
      const r = await fetch(`${API}/api/aisha`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ messages: history }),
      });
      if (!r.ok) { const e = await r.json(); throw new Error(e.detail || `HTTP ${r.status}`); }
      const data = await r.json();
      setThinking(false);
      appendMessage('assistant', data.reply);
      history.push({ role: 'assistant', content: data.reply });
      speak(data.reply); // 🔊 AISHA speaks her reply
    } catch(e) {
      setThinking(false);
      const errMsg = `Ugh, something broke. Typical. (${e.message})`;
      appendMessage('assistant', errMsg);
      speak(errMsg);
    }
  }

  function sendSuggestion(text) {
    inputEl.value = text;
    sendMessage();
  }

  function clearChat() {
    synth.cancel();
    history = [];
    document.querySelectorAll('.msg').forEach(el => el.remove());
    const w = document.getElementById('welcome');
    if (w) w.style.display = 'block';
  }

  function escHtml(str) {
    return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }
</script>
</body>
</html>
