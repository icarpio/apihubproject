<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>City History · AI</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,400&family=Jost:wght@300;400;500&display=swap" rel="stylesheet"/>
<style>
  :root {
    --bg:      #0e0b07;
    --surface: #151209;
    --border:  rgba(205,160,70,0.18);
    --gold:    #cd9f46;
    --gold2:   #f0c96a;
    --text:    #f2ead8;
    --muted:   rgba(242,234,216,0.4);
    --card-bg: rgba(205,160,70,0.04);
  }
  *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
  body { min-height:100vh; background:var(--bg); color:var(--text); font-family:'Jost',sans-serif; overflow-x:hidden; }
  body::before { content:''; position:fixed; inset:0; background:
    radial-gradient(ellipse at 30% 10%, rgba(205,160,70,0.07) 0%, transparent 55%),
    radial-gradient(ellipse at 80% 90%, rgba(205,160,70,0.04) 0%, transparent 45%);
    pointer-events:none; z-index:0; }

  header { text-align:center; padding:clamp(52px,8vw,80px) 16px clamp(20px,4vw,32px); position:relative; z-index:1; }
  .header-rule { width:48px; height:1px; background:linear-gradient(90deg,transparent,var(--gold),transparent); margin:0 auto 18px; }
  h1 { font-family:'Playfair Display',serif; font-size:clamp(2rem,9vw,5.5rem); font-weight:700; line-height:1.05; }
  h1 .accent { font-style:italic; font-weight:400; color:var(--gold2); }
  .tagline { margin-top:10px; color:var(--muted); font-size:clamp(0.62rem,2.2vw,0.78rem); letter-spacing:0.22em; text-transform:uppercase; font-weight:300; }
  #translate-bar-container { padding:10px 0 0; }

  .form-wrap { max-width:560px; margin:24px auto 0; padding:0 14px; position:relative; z-index:1; }
  .form-card { background:var(--surface); border:1px solid var(--border); border-radius:18px; padding:clamp(16px,4vw,26px); }
  .input-row { display:flex; gap:8px; }
  .input-row input { flex:1; min-width:0; padding:clamp(10px,2.5vw,13px) clamp(12px,3vw,18px); background:rgba(255,255,255,0.04); border:1px solid var(--border); border-radius:12px; color:var(--text); font-family:'Jost',sans-serif; font-size:clamp(0.88rem,2.5vw,0.95rem); outline:none; transition:border-color 0.2s; }
  .input-row input:focus { border-color:var(--gold); }
  .input-row input::placeholder { color:var(--muted); }
  .search-btn { padding:clamp(10px,2.5vw,13px) clamp(14px,3vw,24px); background:linear-gradient(135deg,var(--gold),var(--gold2)); border:none; border-radius:12px; color:#0e0b07; font-family:'Jost',sans-serif; font-size:clamp(0.82rem,2.5vw,0.9rem); font-weight:600; cursor:pointer; white-space:nowrap; flex-shrink:0; transition:all 0.25s; }
  .search-btn:hover { transform:translateY(-1px); box-shadow:0 8px 24px rgba(205,160,70,0.3); }
  .search-btn:active { transform:scale(0.98); }
  .search-btn:disabled { opacity:0.45; cursor:not-allowed; transform:none; box-shadow:none; }
  @media(max-width:360px) { .input-row { flex-direction:column; } .search-btn { width:100%; } }

  .quick-cities { display:flex; flex-wrap:wrap; gap:6px; margin-top:14px; }
  .city-pill { padding:5px clamp(10px,2.5vw,14px); background:transparent; border:1px solid var(--border); border-radius:100px; color:var(--muted); font-size:clamp(0.68rem,2vw,0.75rem); cursor:pointer; transition:all 0.2s; font-family:'Jost',sans-serif; }
  .city-pill:hover { border-color:var(--gold); color:var(--gold); }

  .status { text-align:center; padding:50px 16px; display:none; position:relative; z-index:1; }
  .spinner { display:inline-block; width:36px; height:36px; border:2px solid rgba(205,160,70,0.15); border-top-color:var(--gold); border-radius:50%; animation:spin 0.9s linear infinite; }
  @keyframes spin { to{transform:rotate(360deg)} }
  .status-text { margin-top:12px; color:var(--muted); font-size:0.82rem; letter-spacing:0.1em; }

  .result { max-width:720px; margin:clamp(24px,5vw,40px) auto; padding:0 14px clamp(40px,8vw,80px); display:none; opacity:0; transform:translateY(18px); transition:opacity 0.5s ease,transform 0.5s ease; position:relative; z-index:1; }
  .result.visible { opacity:1; transform:translateY(0); }
  .result-card { background:var(--card-bg); border:1px solid var(--border); border-radius:18px; padding:clamp(22px,5vw,38px); }
  .city-name { font-family:'Playfair Display',serif; font-size:clamp(1.5rem,6vw,2.8rem); font-weight:700; color:var(--gold2); margin-bottom:16px; line-height:1.1; }
  .city-rule { height:1px; background:linear-gradient(90deg,var(--gold),transparent); margin-bottom:20px; opacity:0.35; }
  .city-text { font-family:'Playfair Display',serif; font-style:italic; font-size:clamp(0.92rem,2.5vw,1.08rem); line-height:1.9; color:rgba(242,234,216,0.85); }
  .city-footer { margin-top:20px; display:flex; gap:8px; flex-wrap:wrap; }
  .city-badge { padding:3px 12px; background:rgba(205,160,70,0.08); border:1px solid rgba(205,160,70,0.18); border-radius:100px; font-size:0.68rem; letter-spacing:0.15em; text-transform:uppercase; color:rgba(205,160,70,0.55); }
  .error-msg { text-align:center; color:#ef4444; font-size:0.88rem; padding:20px; line-height:1.6; }
  .badge-cached { background:rgba(39,174,96,0.1); border-color:rgba(39,174,96,0.3); color:#27ae60; }
  .badge-fresh  { background:rgba(205,160,70,0.08); border-color:rgba(205,160,70,0.18); color:rgba(205,160,70,0.7); }

  .back { position:fixed; top:14px; left:14px; z-index:100; text-decoration:none; color:#1a1a1a; font-size:0.72rem; letter-spacing:0.15em; text-transform:uppercase; background:rgba(245,240,232,0.9); padding:7px 14px; border-radius:2px; border:1px solid rgba(26,26,26,0.2); backdrop-filter:blur(8px); font-family:'IBM Plex Mono',monospace; }
</style>
</head>
<body>
<a href="../index.html" class="back">← Hub</a>
<header>
  <div class="header-rule"></div>
  <h1>City <span class="accent">History</span></h1>
  <p class="tagline">AI-powered · Any city</p>
  <div id="translate-bar-container"></div>
</header>

<div class="form-wrap">
  <div class="form-card">
    <div class="input-row">
      <input type="text" id="city" placeholder="e.g. Rome, Tokyo, Buenos Aires..."/>
      <button class="search-btn" id="search-btn" onclick="search()">Explore →</button>
    </div>
    <div class="quick-cities">
      <button class="city-pill" onclick="quick('Rome')">🏛 Rome</button>
      <button class="city-pill" onclick="quick('Tokyo')">🗼 Tokyo</button>
      <button class="city-pill" onclick="quick('Cairo')">🏺 Cairo</button>
      <button class="city-pill" onclick="quick('Paris')">🥐 Paris</button>
      <button class="city-pill" onclick="quick('New York')">🗽 New York</button>
    </div>
  </div>
</div>

<div class="status" id="status">
  <div class="spinner"></div>
  <p class="status-text">Researching the history of this city…</p>
</div>
<div class="result" id="result"></div>

<script src="../js/config.js"></script>
<script src="../js/translate.js"></script>
<script>
  let rawData = null, currentLang = 'en';

  renderTranslateBar('translate-bar-container', async (lang) => {
    currentLang = lang;
    if (rawData) await renderResult(rawData, lang);
  });

  function quick(city) { document.getElementById('city').value = city; search(); }

  async function renderResult(d, lang) {
    let cityName = d.city, text = d.text;
    if (lang !== 'en') {
      [cityName, text] = await Promise.all([
        translateTexts([d.city], lang).then(r => r[0]),
        translateTexts([d.text], lang).then(r => r[0]),
      ]);
    }
    const cachedBadge = d.cached
      ? `<span class="city-badge badge-cached">⚡ From cache</span>`
      : `<span class="city-badge badge-fresh">✦ AI Generated</span>`;
    const el = document.getElementById('result');
    el.innerHTML = `
      <div class="result-card">
        <div class="city-name">${cityName}</div>
        <div class="city-rule"></div>
        <p class="city-text">${text}</p>
        <div class="city-footer">
          ${cachedBadge}
        </div>
      </div>`;
    el.style.display = 'block';
    requestAnimationFrame(() => requestAnimationFrame(() => el.classList.add('visible')));
  }

  async function search() {
    const city = document.getElementById('city').value.trim();
    if (!city) { document.getElementById('city').focus(); return; }
    const btn = document.getElementById('search-btn');
    btn.disabled = true; btn.textContent = '…';
    const el = document.getElementById('result');
    el.classList.remove('visible'); el.style.display = 'none';
    rawData = null;
    document.getElementById('status').style.display = 'block';
    try {
      const r = await fetch(`${API}/api/city-history`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ city }),
      });
      if (!r.ok) { const e = await r.json(); throw new Error(e.detail || `HTTP ${r.status}`); }
      rawData = await r.json();
      document.getElementById('status').style.display = 'none';
      await renderResult(rawData, currentLang);
    } catch(e) {
      document.getElementById('status').style.display = 'none';
      el.innerHTML = `<p class="error-msg">⚠️ ${e.message || 'Could not connect to backend.'}</p>`;
      el.style.display = 'block';
      requestAnimationFrame(() => requestAnimationFrame(() => el.classList.add('visible')));
    }
    btn.disabled = false; btn.textContent = 'Explore →';
  }

  document.getElementById('city').addEventListener('keypress', e => e.key === 'Enter' && search());
</script>
</body>
</html>
